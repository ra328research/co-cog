<!DOCTYPE html>
<html lang="en">

  <title>The Co-Cog Digital Monitoring System</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      line-height: 1.6;
      max-width: 700px;
      margin: 2rem auto;
      padding: 0 1rem;
      color: #333;
      background-color: #fdfdfd;
    }

    h1, h2, h3, h4 {
      text-align: center;

    }

    }

      border-radius: 4px;
      display: block;
      margin: 0.5rem auto;
    }

    a {
      color: #007bff;
      text-decoration: none;

    }

    .contact p {
      margin: 0.3rem 0;
      text-align: center;
    }

    .download-btn {
      display: inline-block;
      margin-top: 0.5rem;
      padding: 0.5rem 1rem;
      background-color: #007bff;
      color: white;
      border-radius: 4px;
      text-decoration: none;
    }

    .download-btn:hover {
      background-color: #0056b3;
    }

    .qr-code {
      text-align: center;
      margin-top: 1rem;
    }

    .qr-code img {
      max-width: 150px;
    }

    .references ol {
      padding-left: 1.2rem;
    }
